<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Wall</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  background:#0a0a16;
  overflow:hidden;
  width:100vw;height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;
}

#wall{
  position:relative;
  width:100%;height:100%;
}

.chip{
  position:absolute;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
  line-height:1;
  letter-spacing:-0.01em;
  transition:filter 0.14s ease;
}

.chip:hover{
  filter:brightness(1.5) drop-shadow(0 0 10px var(--c));
}

.chip.lit{
  filter:brightness(1.8) drop-shadow(0 0 18px var(--c));
}

@keyframes pop-out{
  0%  {transform:rotate(var(--r)) scale(1);   opacity:1}
  35% {transform:rotate(var(--r)) scale(1.45);opacity:.85}
  100%{transform:rotate(calc(var(--r) + 25deg)) scale(0);opacity:0}
}

.chip.popping{
  animation:pop-out .3s cubic-bezier(.4,0,.2,1) forwards;
  pointer-events:none;
}

.pt{
  position:fixed;border-radius:50%;pointer-events:none;
  animation:pt-fly .52s ease-out forwards;
}

@keyframes pt-fly{
  0%  {transform:translate(0,0) scale(1);opacity:.9}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

/* ── popup ── */
#popup{
  position:fixed;
  background:#111128;
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
  padding:20px 22px 18px;
  width:288px;
  box-shadow:0 16px 56px rgba(0,0,0,.75);
  z-index:200;
  display:none;
}

@keyframes pop-in{
  from{transform:scale(.9) translateY(6px);opacity:0}
  to  {transform:scale(1) translateY(0);    opacity:1}
}

#popup.show{
  display:block;
  animation:pop-in .16s ease-out;
}

.pu-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.pu-word-block{flex:1;min-width:0}
#pu-word{font-size:26px;font-weight:700;color:#fff;line-height:1}
#pu-phonetic{font-size:12px;color:#3a3a60;font-family:'SF Mono','Menlo','Consolas',monospace;margin-top:5px;letter-spacing:.03em}

#btn-speak{
  flex-shrink:0;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:8px;
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#555;
  transition:background .15s, color .15s;
  padding:0;
}
#btn-speak:hover{background:rgba(255,255,255,.12);color:#bbb}
#btn-speak.playing{color:#a78bfa;background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3)}

#pu-pos {font-size:10px;color:#3a3a5c;text-transform:uppercase;letter-spacing:.12em;margin:5px 0 12px}
#pu-meaning{font-size:15px;color:#ccc;line-height:1.55}

#pu-example{
  margin-top:12px;padding-top:12px;
  border-top:1px solid rgba(255,255,255,.05);
  font-size:12.5px;color:#555;
  font-style:italic;line-height:1.65;
}

#pu-example em{font-style:normal;color:#999;font-weight:600}

.pu-btns{
  margin-top:16px;display:flex;gap:8px;
}

#btn-know{
  flex:1;
  background:linear-gradient(135deg,#5b21b6,#7c3aed);
  color:#fff;border:none;
  border-radius:10px;padding:10px;
  font-size:13px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:opacity .15s;
}
#btn-know:hover{opacity:.85}

#btn-know kbd{
  font-family:inherit;font-size:10px;font-weight:400;
  background:rgba(255,255,255,.14);
  border-radius:4px;padding:1px 5px;
}

#btn-skip{
  background:rgba(255,255,255,.04);
  color:#444;border:none;
  border-radius:10px;padding:10px 14px;
  font-size:13px;cursor:pointer;
  transition:color .15s;
}
#btn-skip:hover{color:#777}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  padding:14px 22px;
  display:flex;align-items:center;gap:14px;
  pointer-events:none;z-index:100;
}

.hud-label{
  font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;
  color:#1e1e32;
}

.hud-bar{
  flex:1;height:2px;
  background:#111122;border-radius:2px;overflow:hidden;
}

.hud-fill{
  height:100%;
  background:linear-gradient(90deg,#5b21b6,#7c3aed);
  border-radius:2px;
  transition:width .4s ease;
  width:0%;
}

.hud-count{font-size:11px;color:#1e1e32;white-space:nowrap}
.hud-count b{color:#333}

/* ── done ── */
#done{
  display:none;
  position:fixed;inset:0;
  background:rgba(6,6,18,.93);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:300;
}
#done.show{display:flex}
#done h2{font-size:30px;font-weight:700;color:#fff}
#done p{color:#444;font-size:14px}

#next-btn{
  background:linear-gradient(135deg,#5b21b6,#7c3aed);
  color:#fff;border:none;border-radius:100px;
  padding:13px 38px;font-size:15px;font-weight:600;
  cursor:pointer;margin-top:8px;transition:opacity .15s;
}
#next-btn:hover{opacity:.85}

/* ── import button ── */
#import-btn{
  font-size:11px;color:#252540;
  background:none;border:1px solid #1a1a2e;
  border-radius:6px;padding:5px 10px;
  cursor:pointer;white-space:nowrap;
  pointer-events:all;flex-shrink:0;
  transition:color .15s,border-color .15s;
}
#import-btn:hover{color:#555;border-color:#2e2e50}
#import-btn.has-custom{color:#7c3aed;border-color:#3d1f8a}

/* ── import modal ── */
#import-modal{
  display:none;position:fixed;inset:0;
  background:rgba(6,6,18,.9);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  align-items:center;justify-content:center;z-index:400;
}
#import-modal.show{display:flex}

#import-box{
  background:#111128;
  border:1px solid rgba(255,255,255,.07);
  border-radius:20px;padding:26px 28px 22px;
  width:460px;max-width:92vw;
  box-shadow:0 24px 80px rgba(0,0,0,.75);
  animation:pop-in .18s ease-out;
}

.imp-header{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:18px;
}
.imp-title{font-size:16px;font-weight:600;color:#fff}

#imp-close{
  background:none;border:none;color:#333;
  font-size:16px;cursor:pointer;padding:2px 6px;
  transition:color .15s;line-height:1;
}
#imp-close:hover{color:#888}

#drop-zone{
  border:2px dashed #1c1c38;border-radius:14px;
  padding:28px 20px;text-align:center;cursor:pointer;
  transition:border-color .15s,background .15s;
  margin-bottom:16px;
}
#drop-zone:hover,#drop-zone.drag-over{
  border-color:#5b21b6;background:rgba(91,33,182,.05);
}
#drop-zone p{color:#333;font-size:14px;line-height:2}
.dz-icon{font-size:26px;opacity:.3;margin-bottom:6px}
.dz-pick{color:#7c3aed;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
#file-input{display:none}

.fmt-list{
  font-size:12px;color:#2a2a44;line-height:2;
  padding:12px 16px;background:rgba(255,255,255,.02);
  border-radius:10px;margin-bottom:16px;
}
.fmt-list b{color:#444}

.imp-footer{display:flex;gap:8px;justify-content:flex-end}

#imp-tpl,#imp-default{
  font-size:12px;color:#333;cursor:pointer;
  background:rgba(255,255,255,.03);border:none;
  border-radius:8px;padding:8px 14px;
  transition:color .15s;
}
#imp-tpl:hover,#imp-default:hover{color:#777}

#imp-status{
  margin-top:12px;font-size:13px;
  color:#6ee7b7;text-align:center;min-height:18px;
}
#imp-status.err{color:#fca5a5}
</style>
</head>
<body>

<div id="wall"></div>

<div id="hud">
  <span class="hud-label">Word Wall</span>
  <div class="hud-bar"><div class="hud-fill" id="hud-fill"></div></div>
  <span class="hud-count"><b id="hc">0</b>/<b id="ht">0</b></span>
  <button id="import-btn">导入词书</button>
</div>

<div id="popup">
  <div class="pu-top">
    <div class="pu-word-block">
      <div id="pu-word"></div>
      <div id="pu-phonetic"></div>
    </div>
    <button id="btn-speak" title="播放发音">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </button>
  </div>
  <div id="pu-pos"></div>
  <div id="pu-meaning"></div>
  <div id="pu-example"></div>
  <div class="pu-btns">
    <button id="btn-know">认识 ✓ <kbd>Space</kbd></button>
    <button id="btn-skip">跳过 Esc</button>
  </div>
</div>

<div id="done">
  <h2>Wall cleared ✓</h2>
  <p id="done-p"></p>
  <button id="next-btn">Next wall →</button>
</div>

<div id="import-modal">
  <div id="import-box">
    <div class="imp-header">
      <span class="imp-title">导入词书</span>
      <button id="imp-close">✕</button>
    </div>
    <div id="drop-zone">
      <div class="dz-icon">📄</div>
      <p>拖拽文件到这里</p>
      <p style="font-size:12px">或 <label for="file-input" class="dz-pick">点击选择文件</label></p>
      <input type="file" id="file-input" accept=".txt,.csv,.tsv,.json">
    </div>
    <div class="fmt-list">
      <b>支持的格式</b><br>
      · <b>.txt</b> — 每行一个词（仅词，无释义）<br>
      · <b>.csv</b> — 首行为表头：word, meaning, phonetic, pos, example<br>
      · <b>.tsv</b> — 制表符分隔，兼容 Anki 导出（word↹meaning↹...）<br>
      · <b>.json</b> — [{word, meaning, phonetic, pos, example}]
    </div>
    <div class="imp-footer">
      <button id="imp-tpl">下载模板 CSV</button>
      <button id="imp-default">恢复默认词书</button>
    </div>
    <div id="imp-status"></div>
  </div>
</div>

<script>

/* ──────── config ──────── */
const WALL_SIZE  = 42;
const FS_LEVELS  = [62, 46, 34, 24, 17, 13];
const FS_COUNTS  = [ 3,  4,  6,  9, 11,  9]; // sum = 42
const COLORS     = [
  '#c4b5fd','#7dd3fc','#86efac','#fca5a5',
  '#fcd34d','#5eead4','#e879f9','#fb923c',
  '#f9a8d4','#a3e635',
];
const GAP = 10; // min gap between words

/* ──────── state ──────── */
let chips = [], cleared = 0;
let activeChip = null, activeData = null;
let boxes = [];

/* ──────── utils ──────── */
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){
    const j=0|Math.random()*(i+1);
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}

function sizeList(n){
  const s=[];
  FS_COUNTS.forEach((cnt,i)=>{for(let j=0;j<cnt;j++)s.push(FS_LEVELS[i]);});
  return shuffle(s).slice(0, n);
}

let customWords = null;
(()=>{ try{ const r=localStorage.getItem('ww_custom'); if(r) customWords=JSON.parse(r); }catch(e){} })();

function estBox(text, fs){
  return {
    w: Math.ceil(text.length * fs * 0.63 + 4),
    h: Math.ceil(fs * 1.22)
  };
}

function overlaps(x,y,w,h){
  for(const b of boxes){
    if(x < b.x+b.w+GAP && x+w+GAP > b.x &&
       y < b.y+b.h+GAP && y+h+GAP > b.y) return true;
  }
  return false;
}

function placeWord(w, h){
  const W = window.innerWidth, H = window.innerHeight;
  const TOP = 38;
  /* spiral from near-center outward */
  const cx = W/2 + (Math.random()-.5)*60;
  const cy = H/2 + (Math.random()-.5)*40;
  let theta = Math.random()*Math.PI*2, r = 0;
  for(let i=0;i<3500;i++){
    const x = Math.round(cx + r*Math.cos(theta) - w/2);
    const y = Math.round(cy + r*Math.sin(theta) - h/2);
    if(x>=6 && y>=TOP && x+w<=W-6 && y+h<=H-8){
      if(!overlaps(x,y,w,h)) return {x,y};
    }
    theta += .22 + Math.random()*.08;
    r     += .55;
  }
  /* fallback: random */
  return {
    x: 6  + Math.random()*(W-w-12),
    y: TOP + Math.random()*(H-h-TOP-8)
  };
}

/* ──────── build wall ──────── */
function buildWall(){
  const wall = document.getElementById('wall');
  wall.innerHTML = '';
  boxes=[]; chips=[]; cleared=0;
  activeChip=null; activeData=null;
  closePopup();

  const pool  = customWords && customWords.length ? customWords : WORDS;
  const wallN = Math.min(WALL_SIZE, pool.length);
  const sel   = shuffle(pool).slice(0, wallN);
  const sizes = sizeList(wallN);

  /* sort largest first for better packing */
  const pairs = sel.map((d,i)=>({d,sz:sizes[i]}))
                   .sort((a,b)=>b.sz-a.sz);

  pairs.forEach(({d,sz})=>{
    const {w,h} = estBox(d.w, sz);
    const pos   = placeWord(w, h);
    boxes.push({x:pos.x, y:pos.y, w, h});

    const maxRot  = sz>=46 ? 6 : sz>=24 ? 12 : 18;
    const rot     = (Math.random()-.5)*maxRot;
    const color   = COLORS[0|Math.random()*COLORS.length];
    const fw      = sz>=50?900 : sz>=36?700 : sz>=24?600 : sz>=17?500 : 400;
    const opacity = sz<=13 ? .55 : sz<=17 ? .75 : 1;

    const el = document.createElement('span');
    el.className = 'chip';
    el.textContent = d.w;
    el.style.cssText = `
      left:${pos.x}px; top:${pos.y}px;
      font-size:${sz}px; font-weight:${fw};
      color:${color}; --c:${color};
      opacity:${opacity};
      transform:rotate(${rot.toFixed(1)}deg);
      --r:${rot.toFixed(1)}deg;
    `;
    el.addEventListener('click', e=>{
      e.stopPropagation();
      if(!el.classList.contains('popping')) showPopup(d, el, color);
    });
    wall.appendChild(el);
    chips.push({d, el});
  });

  document.getElementById('ht').textContent = wallN;
  updateHUD();
}

/* ──────── speech ──────── */
let speakTimer = null;
let preferredVoice = null;

function initVoice(){
  const pick = () => {
    const vs = speechSynthesis.getVoices();
    if(!vs.length) return;
    /* Priority: high-quality US English voices */
    const names = ['Samantha','Ava (Enhanced)','Ava','Alex','Susan','Zira','Google US English'];
    for(const name of names){
      const v = vs.find(v => v.name === name);
      if(v){ preferredVoice = v; return; }
    }
    preferredVoice = vs.find(v => v.lang === 'en-US' && v.localService)
                  || vs.find(v => v.lang === 'en-US');
  };
  if(speechSynthesis.getVoices().length) pick();
  speechSynthesis.onvoiceschanged = pick;
}

function speak(word){
  if(!window.speechSynthesis || !word) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.82;
  if(preferredVoice) u.voice = preferredVoice;

  const btn = document.getElementById('btn-speak');
  btn.classList.add('playing');
  u.onend = u.onerror = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
}

/* ──────── popup ──────── */
function showPopup(d, el, color){
  if(activeChip){ activeChip.classList.remove('lit'); }
  activeChip = el;
  activeData = d;
  el.classList.add('lit');

  document.getElementById('pu-word').textContent     = d.w;
  document.getElementById('pu-word').style.color     = color;
  document.getElementById('pu-phonetic').textContent = d.p || '';
  document.getElementById('pu-pos').textContent      = d.pos;
  document.getElementById('pu-meaning').textContent  = d.m;
  document.getElementById('pu-example').innerHTML    =
    d.ex.replace(/\{(.+?)\}/g, '<em>$1</em>');
  document.getElementById('btn-speak').classList.remove('playing');

  const popup = document.getElementById('popup');
  popup.classList.add('show');

  /* auto-play after short delay so popup animation finishes first */
  clearTimeout(speakTimer);
  speakTimer = setTimeout(() => speak(d.w), 200);

  /* position near word, clamp to viewport */
  requestAnimationFrame(()=>{
    const r   = el.getBoundingClientRect();
    const pw  = popup.offsetWidth  || 288;
    const ph  = popup.offsetHeight || 210;
    const W   = window.innerWidth;
    const H   = window.innerHeight;
    const GAP = 14;

    let left = r.left + r.width/2 - pw/2;
    let top  = r.bottom + GAP;

    if(top + ph > H-10) top = r.top - ph - GAP;
    if(top < 10){
      top  = r.top + r.height/2 - ph/2;
      left = r.left > W/2 ? r.left-pw-GAP : r.right+GAP;
    }
    left = Math.max(10, Math.min(left, W-pw-10));
    top  = Math.max(10, Math.min(top,  H-ph-10));

    popup.style.left = left+'px';
    popup.style.top  = top+'px';
  });
}

function closePopup(){
  clearTimeout(speakTimer);
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(activeChip) activeChip.classList.remove('lit');
  activeChip = null; activeData = null;
  document.getElementById('popup').classList.remove('show');
}

function popActive(){
  if(!activeChip) return;
  const el = activeChip;
  closePopup();
  burst(el);
  el.classList.add('popping');
  setTimeout(()=>{
    el.style.visibility='hidden';
    el.style.pointerEvents='none';
    cleared++;
    updateHUD();
    if(cleared >= chips.length) setTimeout(showDone, 380);
  }, 300);
}

/* ──────── particles ──────── */
function burst(el){
  const r  = el.getBoundingClientRect();
  const cx = r.left + r.width/2;
  const cy = r.top  + r.height/2;
  const c  = el.style.getPropertyValue('--c') || '#fff';
  for(let i=0;i<11;i++){
    const a  = (i/11)*Math.PI*2;
    const d  = 36+Math.random()*46;
    const sz = 3+Math.random()*5;
    const p  = document.createElement('div');
    p.className='pt';
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;
      background:${c};margin:${-sz/2}px;
      --tx:${(Math.cos(a)*d).toFixed(1)}px;
      --ty:${(Math.sin(a)*d).toFixed(1)}px`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 540);
  }
}

/* ──────── HUD ──────── */
function updateHUD(){
  document.getElementById('hc').textContent = cleared;
  document.getElementById('hud-fill').style.width = `${(cleared/(chips.length||1))*100}%`;
}

/* ──────── done screen ──────── */
function showDone(){
  document.getElementById('done-p').textContent = `本轮 ${chips.length} 个词全部搞定`;
  document.getElementById('done').classList.add('show');
}

/* ──────── events ──────── */
document.addEventListener('keydown', e=>{
  if(e.code==='Space' && activeData){ e.preventDefault(); popActive(); }
  if(e.code==='Escape') closePopup();
});

document.addEventListener('click', e=>{
  const popup = document.getElementById('popup');
  if(!popup.contains(e.target)) closePopup();
});

document.getElementById('btn-know').addEventListener('click', e=>{ e.stopPropagation(); popActive(); });
document.getElementById('btn-skip').addEventListener('click', e=>{ e.stopPropagation(); closePopup(); });
document.getElementById('btn-speak').addEventListener('click', e=>{ e.stopPropagation(); speak(activeData && activeData.w); });
document.getElementById('next-btn').addEventListener('click', ()=>{
  document.getElementById('done').classList.remove('show');
  buildWall();
});

/* ──────── import ──────── */
function csvSplit(line){
  const res=[]; let cur='',q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===','&&!q){res.push(cur);cur='';}
    else cur+=line[i];
  }
  res.push(cur);
  return res.map(s=>s.trim().replace(/^"|"$/g,''));
}

function parseFile(text, filename){
  const ext=(filename.match(/\.([a-z]+)$/i)||['','txt'])[1].toLowerCase();
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return [];
  let words=[];
  try{
    if(ext==='json'||text.trimStart().startsWith('[')){
      return JSON.parse(text).map(d=>({
        w:d.word||d.w||'', p:d.phonetic||d.p||'',
        pos:d.pos||'', m:d.meaning||d.m||d.definition||'', ex:d.example||d.ex||''
      })).filter(d=>d.w.trim());
    }
    const hasTabs=lines.some(l=>l.includes('\t'));
    const sep=hasTabs?'\t':',';
    const first=lines[0].toLowerCase().split(sep).map(s=>s.trim().replace(/^"|"$/g,''));
    const hasHead=first.includes('word')||first.includes('w');
    if(hasHead){
      const ci=names=>{ for(const n of names){const i=first.indexOf(n);if(i>-1)return i;} return -1; };
      const iW=ci(['word','w']), iP=ci(['phonetic','p','ipa']);
      const iPO=ci(['pos','type','part']), iM=ci(['meaning','m','definition','def','translation']);
      const iE=ci(['example','ex','sentence']);
      for(let i=1;i<lines.length;i++){
        const p=sep===','?csvSplit(lines[i]):lines[i].split('\t');
        if(!p[iW]) continue;
        words.push({w:p[iW]||'', p:iP>-1?p[iP]||'':'', pos:iPO>-1?p[iPO]||'':'',
          m:iM>-1?p[iM]||'':'', ex:iE>-1?p[iE]||'':''});
      }
    } else if(hasTabs){
      lines.forEach(l=>{ const p=l.split('\t'); if(p[0]) words.push({w:p[0],m:p[1]||'',p:p[2]||'',pos:p[3]||'',ex:p[4]||''}); });
    } else {
      lines.forEach(l=>{
        const p=l.split(',');
        if(p.length>=2&&!/\s/.test(p[0])) words.push({w:p[0].trim(),m:p.slice(1).join(',').trim(),p:'',pos:'',ex:''});
        else words.push({w:l,m:'',p:'',pos:'',ex:''});
      });
    }
  }catch(e){ return null; }
  return words.filter(d=>d.w.trim());
}

function applyWords(words){
  customWords=words;
  localStorage.setItem('ww_custom',JSON.stringify(words));
  document.getElementById('import-btn').classList.add('has-custom');
  closeImportModal();
  buildWall();
}

function useDefaultWords(){
  customWords=null;
  localStorage.removeItem('ww_custom');
  document.getElementById('import-btn').classList.remove('has-custom');
  closeImportModal();
  buildWall();
}

function handleFile(file){
  if(!file) return;
  const st=document.getElementById('imp-status');
  st.className=''; st.textContent='解析中…';
  const reader=new FileReader();
  reader.onload=e=>{
    const words=parseFile(e.target.result,file.name);
    if(!words||!words.length){ st.className='err'; st.textContent='解析失败，请检查格式'; return; }
    st.textContent=`✓ 解析到 ${words.length} 个词，应用中…`;
    setTimeout(()=>applyWords(words),500);
  };
  reader.readAsText(file,'utf-8');
}

function downloadTemplate(){
  const csv=[
    'word,meaning,phonetic,pos,example',
    'serendipity,意外发现美好事物的能力,/ˌsɛrənˈdɪpɪti/,n,Finding that coffee shop was pure serendipity.',
    'ephemeral,短暂的；转瞬即逝的,/ɪˈfɛmərəl/,adj,Social media fame is often ephemeral.',
    'tenacious,坚韧的；不屈不挠的,/tɪˈneɪʃəs/,adj,She was tenacious in pursuing her goals.',
    'eloquent,雄辩的；有说服力的,/ˈɛləkwənt/,adj,She gave an eloquent speech that moved everyone.',
  ].join('\n');
  const a=Object.assign(document.createElement('a'),{
    href:'data:text/csv;charset=utf-8,'+encodeURIComponent(csv),
    download:'wordwall-template.csv'
  });
  a.click();
}

function openImportModal(){ document.getElementById('import-modal').classList.add('show'); }
function closeImportModal(){
  document.getElementById('import-modal').classList.remove('show');
  document.getElementById('imp-status').textContent='';
  document.getElementById('file-input').value='';
}

document.getElementById('import-btn').addEventListener('click',e=>{ e.stopPropagation(); openImportModal(); });
document.getElementById('imp-close').addEventListener('click',closeImportModal);
document.getElementById('import-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('import-modal')) closeImportModal(); });
document.getElementById('imp-default').addEventListener('click',useDefaultWords);
document.getElementById('imp-tpl').addEventListener('click',downloadTemplate);
document.getElementById('file-input').addEventListener('change',e=>handleFile(e.target.files[0]));

const dz=document.getElementById('drop-zone');
dz.addEventListener('click',()=>document.getElementById('file-input').click());
dz.addEventListener('dragover',e=>{ e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{ e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });

if(customWords) document.getElementById('import-btn').classList.add('has-custom');

/* ──────── init ──────── */
initVoice();
buildWall();
</script>
</body>
</html>
